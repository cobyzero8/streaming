<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel StreamZone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-white p-8">

    <div id="loginSection" class="max-w-md mx-auto mt-20 bg-slate-900 p-8 rounded-2xl border border-slate-800">
        <h2 class="text-xl font-black mb-6">Acceso Administrativo</h2>
        <input type="text" id="userField" placeholder="Usuario" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl mb-4 text-white">
        <input type="password" id="passField" placeholder="Contraseña" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl mb-4 text-white">
        <button id="loginBtn" class="w-full bg-purple-600 p-3 rounded-xl font-bold hover:bg-purple-500">Entrar</button>
    </div>

    <div id="dashboard" class="hidden max-w-6xl mx-auto">
        <h1 class="text-3xl font-black mb-6">Control de Alquileres</h1>
        <div class="bg-slate-900 p-6 rounded-2xl mb-8 border border-slate-800 grid grid-cols-1 md:grid-cols-5 gap-4">
            <input type="text" id="clientName" placeholder="Nombre" class="bg-slate-950 border border-slate-800 p-2 rounded-lg">
            <input type="text" id="phone" placeholder="Celular" class="bg-slate-950 border border-slate-800 p-2 rounded-lg">
            <input type="text" id="appName" placeholder="App" class="bg-slate-950 border border-slate-800 p-2 rounded-lg">
            <input type="date" id="startDate" class="bg-slate-950 border border-slate-800 p-2 rounded-lg">
            <input type="date" id="endDate" class="bg-slate-950 border border-slate-800 p-2 rounded-lg">
            <button onclick="addRental()" class="md:col-span-5 bg-emerald-600 p-3 rounded-xl font-bold">Registrar Cliente</button>
        </div>
        <table class="w-full text-left border-collapse bg-slate-900 rounded-2xl overflow-hidden">
            <thead class="bg-slate-800 text-slate-400 text-xs uppercase">
                <tr><th class="p-4">Cliente</th><th class="p-4">App</th><th class="p-4">Faltan</th><th class="p-4">Acciones</th></tr>
            </thead>
            <tbody id="rentalTable"></tbody>
        </table>
    </div>

    <script>
        // CONFIGURACIÓN SEGURA
        window.USER_ADMIN = "coby"; 
        window.PASS_ADMIN = "12345"; 

        // Solo crear cliente si no existe
        if (!window.supabaseClient) {
            window.supabaseClient = supabase.createClient(
                'https://hicjmlcdnrcjriuqhppb.supabase.co', 
                'sb_publishable_CaDktAOkfY4jMUv5LITprQ_ZDd7KNrh'
            );
        }

        // Evento de Login separado para evitar errores de onclick
        document.getElementById('loginBtn').addEventListener('click', function() {
            const u = document.getElementById('userField').value;
            const p = document.getElementById('passField').value;
            
            if (u === window.USER_ADMIN && p === window.PASS_ADMIN) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadRentals();
            } else {
                alert("Usuario o contraseña incorrectos");
            }
        });

        async function loadRentals() {
            const { data } = await window.supabaseClient.from('alquileres').select('*');
            const tbody = document.getElementById('rentalTable');
            tbody.innerHTML = '';
            if (data) {
                data.forEach(r => {
                    const diff = Math.ceil((new Date(r.end_date) - new Date()) / (1000 * 60 * 60 * 24));
                    let color = (diff <= 3) ? 'bg-red-500' : (diff <= 7) ? 'bg-yellow-500' : 'bg-green-500';
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-800">
                            <td class="p-4">${r.client_name}</td>
                            <td class="p-4">${r.app_name}</td>
                            <td class="p-4"><span class="${color} px-2 py-1 rounded text-xs text-black font-bold">${diff} días</span></td>
                            <td class="p-4 flex gap-2">
                                <button onclick="deleteRental('${r.id}')" class="bg-red-600 px-3 py-1 rounded text-xs">Eliminar</button>
                            </td>
                        </tr>`;
                });
            }
        }

        async function addRental() {
            await window.supabaseClient.from('alquileres').insert([{ 
                client_name: document.getElementById('clientName').value, 
                phone: document.getElementById('phone').value, 
                app_name: document.getElementById('appName').value, 
                start_date: document.getElementById('startDate').value,
                end_date: document.getElementById('endDate').value 
            }]);
            location.reload();
        }
    </script>
</body>
</html>
