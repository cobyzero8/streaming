<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control | StreamZone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-white p-8">

    <div id="loginSection" class="max-w-md mx-auto mt-20 bg-slate-900 p-8 rounded-2xl border border-slate-800">
        <h2 class="text-xl font-black mb-6">Acceso Administrativo</h2>
        <input type="email" id="email" placeholder="Correo" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl mb-4">
        <input type="password" id="password" placeholder="Contraseña" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl mb-4">
        <button onclick="login()" class="w-full bg-purple-600 p-3 rounded-xl font-bold">Entrar</button>
    </div>

    <div id="dashboard" class="hidden max-w-6xl mx-auto">
        <h1 class="text-3xl font-black mb-6">Control de Alquileres</h1>
        
        <div class="bg-slate-900 p-6 rounded-2xl mb-8 border border-slate-800 grid grid-cols-1 md:grid-cols-4 gap-4">
            <input type="text" id="clientName" placeholder="Nombre Cliente" class="bg-slate-950 border border-slate-800 p-2 rounded-lg">
            <input type="text" id="phone" placeholder="WhatsApp (ej: 51999888777)" class="bg-slate-950 border border-slate-800 p-2 rounded-lg">
            <input type="text" id="appName" placeholder="App (Netflix...)" class="bg-slate-950 border border-slate-800 p-2 rounded-lg">
            <input type="date" id="startDate" class="bg-slate-950 border border-slate-800 p-2 rounded-lg">
            <button onclick="addRental()" class="md:col-span-4 bg-emerald-600 p-3 rounded-xl font-bold hover:bg-emerald-500">Registrar Alquiler</button>
        </div>

        <table class="w-full text-left border-collapse bg-slate-900 rounded-2xl overflow-hidden">
            <thead class="bg-slate-800 text-slate-400 text-xs uppercase">
                <tr><th class="p-4">Cliente</th><th class="p-4">App</th><th class="p-4">Días</th><th class="p-4">Acción</th></tr>
            </thead>
            <tbody id="rentalTable"></tbody>
        </table>
    </div>

    <script>
        // CONFIGURACIÓN: CAMBIA ESTO CON TUS DATOS DE SUPABASE
        const supabaseUrl = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpY2ptbGNkbnJjanJpdXFocHBiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NDYxOTMsImV4cCI6MjA5ODUyMjE5M30.GIJbvJXKv-QkKx13xrImrUCf-kbRyOapW4QNA83qYb8';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpY2ptbGNkbnJjanJpdXFocHBiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NjE5MywiZXhwIjoyMDk4NTIyMTkzfQ.ZqgWWoNOW0Ew-zmQrJMHhFY5lxLjT6hXraFR_kaduug';
        const supabase = supabaseClient.createClient(supabaseUrl, supabaseKey);

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert("Error: " + error.message);
            else location.reload();
        }

        async function checkAuth() {
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadRentals();
            }
        }

        function getColorClass(days) {
            if (days <= 20) return 'bg-green-500';
            if (days <= 27) return 'bg-yellow-500';
            if (days === 28) return 'bg-red-500';
            return 'bg-purple-600 animate-pulse'; // Alerta > 28
        }

        async function loadRentals() {
            const { data } = await supabase.from('alquileres').select('*');
            const tbody = document.getElementById('rentalTable');
            tbody.innerHTML = '';
            
            data.forEach(r => {
                const diff = Math.floor((new Date() - new Date(r.start_date)) / (1000 * 60 * 60 * 24));
                const statusColor = getColorClass(diff);
                
                tbody.innerHTML += `
                    <tr class="border-b border-slate-800">
                        <td class="p-4">${r.client_name}</td>
                        <td class="p-4">${r.app_name}</td>
                        <td class="p-4"><span class="${statusColor} px-2 py-1 rounded text-xs text-black font-bold">Día ${diff}</span></td>
                        <td class="p-4">
                            <a href="https://wa.me/${r.phone}?text=Hola ${r.client_name}, tu cuenta de ${r.app_name} está por vencer. ¡Renueva ya!" 
                               target="_blank" class="bg-emerald-600 px-3 py-1 rounded text-xs">Avisar</a>
                        </td>
                    </tr>
                `;
            });
        }

        async function addRental() {
            const client = document.getElementById('clientName').value;
            const phone = document.getElementById('phone').value;
            const app = document.getElementById('appName').value;
            const date = document.getElementById('startDate').value;
            
            await supabase.from('alquileres').insert([{ client_name: client, phone, app_name: app, start_date: date }]);
            location.reload();
        }

        checkAuth();
    </script>
</body>
</html>
