<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel StreamZone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-white p-8">

    <div id="loginSection" class="max-w-md mx-auto mt-20 bg-slate-900 p-8 rounded-2xl border border-slate-800">
        <h2 class="text-xl font-black mb-6">Acceso Administrativo</h2>
        <input type="text" id="userField" placeholder="Usuario" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl mb-4 text-white">
        <input type="password" id="passField" placeholder="Contraseña" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl mb-4 text-white">
        <button onclick="login()" class="w-full bg-purple-600 p-3 rounded-xl font-bold hover:bg-purple-500">Entrar</button>
    </div>

    <div id="dashboard" class="hidden max-w-6xl mx-auto">
        <h1 class="text-3xl font-black mb-6">Control de Alquileres</h1>
        <div class="bg-slate-900 p-6 rounded-2xl mb-8 border border-slate-800 grid grid-cols-1 md:grid-cols-5 gap-4">
            <input type="text" id="clientName" placeholder="Nombre" class="bg-slate-950 border border-slate-800 p-2 rounded-lg">
            <input type="text" id="phone" placeholder="Celular" class="bg-slate-950 border border-slate-800 p-2 rounded-lg">
            <input type="text" id="appName" placeholder="App" class="bg-slate-950 border border-slate-800 p-2 rounded-lg">
            <input type="date" id="startDate" placeholder="Inicio" class="bg-slate-950 border border-slate-800 p-2 rounded-lg" onchange="autoFillDate()">
            <input type="date" id="endDate" placeholder="Fin" class="bg-slate-950 border border-slate-800 p-2 rounded-lg">
            <button onclick="addRental()" class="md:col-span-5 bg-emerald-600 p-3 rounded-xl font-bold">Registrar</button>
        </div>
        <table class="w-full text-left border-collapse bg-slate-900 rounded-2xl overflow-hidden">
            <thead class="bg-slate-800 text-slate-400 text-xs uppercase">
                <tr><th class="p-4">Cliente</th><th class="p-4">App</th><th class="p-4">Inicio</th><th class="p-4">Fin</th><th class="p-4">Faltan</th><th class="p-4">Acción</th></tr>
            </thead>
            <tbody id="rentalTable"></tbody>
        </table>
    </div>

    <script>
        const USER_ADMIN = "coby"; 
        const PASS_ADMIN = "12345"; 
        const supabaseUrl = 'https://hicjmlcdnrcjriuqhppb.supabase.co';
        const supabaseKey = 'sb_publishable_CaDktAOkfY4jMUv5LITprQ_ZDd7KNrh';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function autoFillDate() {
            const start = document.getElementById('startDate').value;
            if(start) {
                let date = new Date(start);
                date.setDate(date.getDate() + 30);
                document.getElementById('endDate').value = date.toISOString().split('T')[0];
            }
        }

        function login() {
            if (document.getElementById('userField').value === USER_ADMIN && document.getElementById('passField').value === PASS_ADMIN) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadRentals();
            } else { alert("Error"); }
        }

        async function loadRentals() {
            const { data } = await supabase.from('alquileres').select('*');
            const tbody = document.getElementById('rentalTable');
            tbody.innerHTML = '';
            if (data) {
                data.forEach(r => {
                    const end = new Date(r.end_date);
                    const today = new Date();
                    const diff = Math.ceil((end - today) / (1000 * 60 * 60 * 24));
                    let color = (diff <= 3) ? 'bg-red-500' : (diff <= 7) ? 'bg-yellow-500' : 'bg-green-500';
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-800">
                            <td class="p-4">${r.client_name}</td>
                            <td class="p-4">${r.app_name}</td>
                            <td class="p-4 text-xs">${r.start_date}</td>
                            <td class="p-4 text-xs">${r.end_date}</td>
                            <td class="p-4"><span class="${color} px-2 py-1 rounded text-xs text-black font-bold">${diff} días</span></td>
                            <td class="p-4"><a href="https://wa.me/${r.phone}" target="_blank" class="bg-emerald-600 px-3 py-1 rounded text-xs">Avisar</a></td>
                        </tr>`;
                });
            }
        }

        async function addRental() {
            await supabase.from('alquileres').insert([{ 
                client_name: document.getElementById('clientName').value, 
                phone: document.getElementById('phone').value, 
                app_name: document.getElementById('appName').value, 
                start_date: document.getElementById('startDate').value,
                end_date: document.getElementById('endDate').value 
            }]);
            location.reload();
        }
    </script>
</body>
</html>
