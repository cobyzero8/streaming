<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multistreaming Perú | Centro de Activación Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .brand-gradient { background: linear-gradient(135deg, #ef4444 0%, #8b5cf6 50%, #3b82f6 100%); }
        .fade-in-section { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease-out, transform 0.6s ease-out; }
        .fade-in-section.show { opacity: 1; transform: translateY(0); }
        @keyframes shrinkProgress { from { width: 100%; } to { width: 0%; } }
        .animate-progress-bar { animation: shrinkProgress 10s linear forwards; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased pb-24">

    <!-- MODAL DE 3 PASOS (ACTUALIZADO: CON BOTÓN X Y CIERRE POR CLIC) -->
    <div id="funnelStepsModal" onclick="cerrarModalPorClic(event)" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-300">
        <div onclick="event.stopPropagation()" class="bg-slate-900 border-2 border-amber-500/80 p-8 rounded-3xl max-w-sm w-full text-center relative shadow-2xl scale-95 transition-transform duration-300">
            
            <!-- Botón X para cerrar -->
            <button onclick="cerrarModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors">
                <i class="fas fa-times text-xl"></i>
            </button>

            <h3 class="text-xl font-black text-white mb-6">Pasos para activar</h3>

            <div class="space-y-4 text-left">
                <div class="flex items-center gap-3 font-bold text-sm"><span class="w-6 h-6 bg-red-600 rounded-full flex items-center justify-center text-[10px]">1</span> Realizas el pago</div>
                <div class="flex items-center gap-3 font-bold text-sm"><span class="w-6 h-6 bg-purple-600 rounded-full flex items-center justify-center text-[10px]">2</span> Te registras</div>
                <div class="flex items-center gap-3 font-bold text-sm"><span class="w-6 h-6 bg-emerald-600 rounded-full flex items-center justify-center text-[10px]">3</span> Me escribes al WhatsApp</div>
            </div>

            <div class="absolute bottom-0 left-0 h-1 bg-amber-500 animate-progress-bar"></div>
        </div>
    </div>

    <!-- MODAL DE COPIADO CENTRAL -->
    <div id="toastNotification" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-slate-900 border-2 border-yellow-500 p-8 rounded-3xl shadow-2xl z-50 opacity-0 scale-95 pointer-events-none transition-all duration-300 text-center max-w-sm w-[90%]">
        <div class="text-yellow-400 text-3xl mb-4"><i class="fas fa-gift"></i></div>
        <p class="text-yellow-400 font-black text-xl tracking-widest">HLHOF77964</p>
        <p class="text-sm font-bold mt-2">Copiado. Pégalo en "código de referido".</p>
    </div>

    <!-- BIENVENIDA -->
    <div id="welcomeModal" class="fixed inset-0 bg-slate-950/95 z-50 flex items-center justify-center p-4 transition-opacity duration-500">
        <div class="bg-slate-900 border border-purple-500/30 p-8 rounded-3xl max-w-sm w-full text-center">
            <h2 class="text-2xl font-black text-white">¡Bienvenido a StreamZone!</h2>
            <button onclick="startExperience()" class="mt-6 w-full py-4 font-black bg-gradient-to-r from-yellow-400 to-amber-500 rounded-xl text-slate-900 uppercase">Ver video</button>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <header class="max-w-4xl mx-auto text-center px-4 pt-12">
        <h1 class="text-4xl font-black text-white">Cuentas Premium de Streaming</h1>
        <div class="mt-10 bg-slate-900 border border-red-500/40 p-3 rounded-3xl">
            <video id="mainVideo" class="w-full rounded-2xl" controls playsinline>
                <source src="video_principal.mp4" type="video/mp4">
            </video>
            <button onclick="mostrarMensajeFidelizacion3Pasos()" class="mt-4 w-full py-4 font-black bg-gradient-to-r from-yellow-400 to-amber-500 rounded-xl text-slate-900 uppercase">He visto el video, inscribirme</button>
        </div>
    </header>

    <div id="unlockedHubContent" class="hidden fade-in-section">
        <section id="optionsPanel" class="max-w-4xl mx-auto px-4 py-8">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button onclick="revealSection('checkoutSocios')" class="p-6 bg-slate-900 border border-red-500/30 rounded-2xl font-bold">1. Realizar Pago (S/. 8.00)</button>
                <button onclick="revealSection('registroUsuario')" class="p-6 bg-slate-900 border border-purple-500/30 rounded-2xl font-bold">2. Registrarme</button>
            </div>

            <div id="checkoutSocios" class="hidden mt-10 p-8 bg-slate-900 border-2 border-purple-500 rounded-3xl text-center">
                <h3 class="text-2xl font-black">Precio: S/. 8.00</h3>
                <p id="paypalUsdLabel" class="text-blue-400 font-bold mt-2">Cargando precio PayPal...</p>
            </div>

            <div id="registroUsuario" class="hidden mt-10 p-8 bg-slate-900 border-2 border-purple-500 rounded-3xl text-center">
                <button onclick="ejecutarAccionRegistro()" class="w-full py-4 bg-amber-500 font-black rounded-xl text-slate-900">Copiar Código y Registrar</button>
            </div>
        </section>
    </div>

    <script>
        function mostrarMensajeFidelizacion3Pasos() {
            const modal = document.getElementById('funnelStepsModal');
            modal.style.pointerEvents = 'auto';
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.querySelector('div').classList.remove('scale-95');
            modal.querySelector('div').classList.add('scale-100');

            setTimeout(() => {
                cerrarModal();
                unlockHub();
            }, 10000);
        }

        function cerrarModal() {
            const modal = document.getElementById('funnelStepsModal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.querySelector('div').classList.add('scale-95');
        }

        function cerrarModalPorClic(event) {
            if (event.target.id === 'funnelStepsModal') cerrarModal();
        }

        function iniciarCambioMonedaPeru() {
            const solesMonto = 8.00;
            fetch('https://open.er-api.com/v6/latest/USD')
                .then(res => res.json())
                .then(data => {
                    const tasa = data.rates.PEN || 3.40;
                    document.getElementById('paypalUsdLabel').innerText = `Equivalente en PayPal: $${(solesMonto / tasa).toFixed(2)} USD`;
                }).catch(() => document.getElementById('paypalUsdLabel').innerText = "PayPal disponible");
        }
        document.addEventListener('DOMContentLoaded', iniciarCambioMonedaPeru);

        function startExperience() {
            document.getElementById('welcomeModal').style.display = 'none';
            document.getElementById('mainVideo').play();
        }

        function unlockHub() {
            const hub = document.getElementById('unlockedHubContent');
            hub.classList.remove('hidden');
            setTimeout(() => hub.classList.add('show'), 50);
        }

        function revealSection(id) {
            ['checkoutSocios', 'registroUsuario'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function ejecutarAccionRegistro() {
            const code = "HLHOF77964";
            navigator.clipboard.writeText(code);
            const toast = document.getElementById('toastNotification');
            toast.classList.remove('opacity-0', 'pointer-events-none', 'scale-95');
            toast.classList.add('opacity-100', 'scale-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'scale-100');
                toast.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
                window.open("https://zodiak.pe/registrar?ref=" + code, '_blank');
            }, 3500);
        }
    </script>
</body>
</html>
